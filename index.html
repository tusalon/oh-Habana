<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OH Habana - Menu</title>
    <link rel="stylesheet" href="styles.css?v=20260614-4" />
  </head>
  <body>
    <main class="shell">
      <aside class="rail" aria-label="Paginas del menu">
        <div class="brand">
          <span>OH</span>
          <strong>Habana</strong>
        </div>
        <nav id="thumbs" class="thumbs"></nav>
      </aside>

      <section class="viewer" aria-label="Menu digital">
        <div class="topbar">
          <button id="prevBtn" class="icon-btn" aria-label="Pagina anterior" title="Pagina anterior">
            <span aria-hidden="true">&lsaquo;</span>
          </button>
          <div class="counter">
            <span id="pageNow">1</span>
            <span>/</span>
            <span id="pageTotal">9</span>
          </div>
          <button id="nextBtn" class="icon-btn" aria-label="Pagina siguiente" title="Pagina siguiente">
            <span aria-hidden="true">&rsaquo;</span>
          </button>
        </div>

        <div id="pageStack" class="agenda">
          <div class="rings" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <script src="script.js?v=20260614-4"></script>
  </body>
</html>
